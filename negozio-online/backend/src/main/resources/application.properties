# profilo di sviluppo attivo
spring.profiles.active=dev
# console web per vedere il database su http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=false
# forza l'attivazione della console H2
management.endpoints.web.exposure.include=h2-console
spring.autoconfigure.exclude=
# server in ascolto sulla porta 8080
server.port=8080
# logging minimale ma con informazioni essenziali di avvio
logging.level.root=WARN
logging.level.com.negozio=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.web=ERROR
logging.level.org.springframework.boot=WARN
logging.level.org.springframework.boot.web.embedded.tomcat.TomcatWebServer=INFO
logging.level.org.springframework.security=ERROR
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type=ERROR
logging.level.com.zaxxer.hikari=ERROR
logging.level.org.apache.catalina=ERROR
logging.level.org.apache.tomcat=ERROR

# database H2 in memoria per sviluppo semplice e veloce
spring.datasource.url=jdbc:h2:mem:enoteca_v2
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# disabilita warning H2
logging.level.org.h2=ERROR
# debug per vedere se h2 console è configurata
logging.level.org.springframework.boot.autoconfigure.h2=DEBUG

# configurazione JPA e hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# crea lo schema da zero ogni volta
spring.jpa.hibernate.ddl-auto=create
# mostra le query SQL per debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# banner Spring Boot minimo
spring.main.banner-mode=console
# disabilita warnings JPA
spring.jpa.open-in-view=false
# disabilita logging devtools
logging.level.org.springframework.boot.devtools=ERROR

# informazioni sull applicazione
app.nome=Enoteca Mendoza
app.versione=1.0.0
app.descrizione=E-commerce di vini per Hostaria de Mendoza - Rende
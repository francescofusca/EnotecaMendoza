<div class="contenitore-prodotti">
  <h2 class="titolo-pagina-categoria">{{ nomeCategoria }}</h2>
  
  <div class="controlli-ordinamento">
    <label for="ordinamento">Ordina per:</label>
    <select id="ordinamento" [(ngModel)]="ordinamento" (change)="cambiaOrdinamento()" class="select-ordinamento">
      <option value="alfabetico">Nome (A-Z)</option>
      <option value="prezzoAsc">Prezzo (crescente)</option>
      <option value="prezzoDesc">Prezzo (decrescente)</option>
    </select>
  </div>

  <div class="griglia-prodotti">
    <div class="card-prodotto" *ngFor="let prodotto of prodotti$ | async; trackBy: trackByProdotto">
      <a [routerLink]="['/prodotto', prodotto.id]" class="card-link-wrapper">
        <img [src]="getUrlImmagine(prodotto)" [alt]="prodotto.nome" class="immagine-prodotto">
        <div class="info-prodotto">
          <h3>{{ prodotto.nome }}</h3>
          <p class="descrizione">{{ prodotto.descrizione }}</p>
        </div>
      </a>
      <div class="info-prodotto-footer">
        <div class="prezzo-disponibilita">
          <div class="prezzo">€{{ prodotto.prezzo | number:'1.2-2' }}</div>
          <div class="info-stock" *ngIf="prodotto.quantita < 10 && prodotto.quantita > 0">
            <span class="avviso-stock">Solo {{ prodotto.quantita }} rimasti!</span>
          </div>
          <div class="esaurito" *ngIf="prodotto.quantita === 0">
            ESAURITO
          </div>
        </div>
        <button 
          class="btn-aggiungi-carrello" 
          (click)="aggiungiProdottoAlCarrello(prodotto)"
          [disabled]="prodotto.quantita === 0">
          {{ prodotto.quantita === 0 ? 'Non disponibile' : 'Aggiungi al carrello' }}
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="(prodotti$ | async)?.length === 0" class="nessun-prodotto">
    <p>Nessun prodotto trovato in questa categoria.</p>
  </div>
</div>

<div class="contenitore-auth">
  <div class="form-wrapper">
    <div class="form-header">
      <h2>Crea il Tuo Account</h2>
      <p>Entra a far parte della nostra community di amanti del vino.</p>
    </div>
    <form [formGroup]="formRegistrazione" (ngSubmit)="onSubmit()">
      <div class="gruppo-form">
        <label for="nome">Nome</label>
        <input type="text" id="nome" formControlName="nome" placeholder="Mario">
      </div>
      <div class="gruppo-form">
        <label for="cognome">Cognome</label>
        <input type="text" id="cognome" formControlName="cognome" placeholder="Rossi">
      </div>
      <div class="gruppo-form">
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email" placeholder="mario.rossi@email.com">
      </div>
      <div class="gruppo-form">
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" placeholder="Minimo 6 caratteri">
      </div>

      <div class="messaggio-errore" *ngIf="messaggioErrore">
        {{ messaggioErrore }}
      </div>
      <button type="submit" class="btn-submit" [disabled]="formRegistrazione.invalid">Registrati</button>
    </form>
    <div class="link-alternativo">
      Hai già un account? <a routerLink="/login">Accedi ora</a>
    </div>
  </div>
</div>
